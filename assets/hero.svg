<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" role="img" aria-labelledby="title desc">
  <title id="title">bedagent hero illustration</title>
  <desc id="desc">A thinker in bed with floating ideas, Sage, blanket gate, and agent hands.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#172554"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="bed" x1="0" x2="1">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="640" fill="url(#bg)"/>
  <circle cx="730" cy="120" r="80" fill="#facc15" opacity=".16"/>
  <circle cx="150" cy="110" r="120" fill="#38bdf8" opacity=".13"/>
  <rect x="135" y="360" width="630" height="120" rx="42" fill="url(#bed)"/>
  <rect x="110" y="450" width="680" height="64" rx="30" fill="#1d4ed8"/>
  <rect x="168" y="304" width="160" height="86" rx="28" fill="#dbeafe"/>
  <rect x="350" y="304" width="310" height="86" rx="28" fill="#bfdbfe" opacity=".9"/>
  <circle cx="282" cy="326" r="34" fill="#fde68a"/>
  <path d="M246 362c22-34 72-35 96 0" fill="none" stroke="#0f172a" stroke-width="12" stroke-linecap="round"/>
  <text x="450" y="550" text-anchor="middle" font-family="Inter,Arial" font-size="28" font-weight="800" fill="#e0f2fe">I think in bed. Agents do the work.</text>
  <g filter="url(#glow)">
    <rect x="250" y="130" width="130" height="58" rx="18" fill="#0ea5e9" opacity=".9"/>
    <rect x="405" y="88" width="160" height="58" rx="18" fill="#8b5cf6" opacity=".9"/>
    <rect x="590" y="155" width="140" height="58" rx="18" fill="#22c55e" opacity=".86"/>
    <path d="M315 188c20 36 58 56 112 66" fill="none" stroke="#93c5fd" stroke-width="4" opacity=".65"/>
    <path d="M485 146c2 52-22 84-72 110" fill="none" stroke="#c4b5fd" stroke-width="4" opacity=".65"/>
    <path d="M620 214c-45 35-96 48-153 42" fill="none" stroke="#86efac" stroke-width="4" opacity=".65"/>
  </g>
  <g transform="translate(650 244)">
    <circle cx="0" cy="0" r="54" fill="#f8fafc" opacity=".92"/>
    <circle cx="-18" cy="-6" r="7" fill="#111827"/>
    <circle cx="18" cy="-6" r="7" fill="#111827"/>
    <path d="M-20 18c14 11 28 11 40 0" fill="none" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
    <text x="0" y="88" text-anchor="middle" font-family="Inter,Arial" font-size="20" font-weight="800" fill="#f8fafc">Sage</text>
  </g>
  <g transform="translate(150 180)" stroke="#e0f2fe" stroke-width="14" stroke-linecap="round" fill="none" opacity=".82">
    <path d="M0 110c45-36 86-43 120-20"/>
    <path d="M34 136c44-23 78-24 105-4"/>
    <path d="M70 160c32-12 58-10 78 6"/>
  </g>
</svg>
