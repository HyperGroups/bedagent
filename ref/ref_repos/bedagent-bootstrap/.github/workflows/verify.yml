name: verify
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup minimal bedagent environment
        run: |
          bash bedagent/scripts/install.sh --platform openclaw --no-ao --quick 2>/dev/null || {
            # install.sh fallback 到手动部署
            echo "[CI] install.sh failed, fallback to manual setup"
            mkdir -p ~/.openclaw/skills/bedagent
            cp bedagent/rules.md ~/.openclaw/skills/bedagent/rules.md
            cp bedagent/SKILL.md ~/.openclaw/skills/bedagent/SKILL.md
            for f in engine.md entry-gate.md task-aware.md task-closure.md loop-check.md; do
              [ -f "bedagent/$f" ] && cp "bedagent/$f" ~/.openclaw/skills/bedagent/
            done
            mkdir -p ~/.openclaw/skills/bedagent/data
            cp bedagent/data/*.md ~/.openclaw/skills/bedagent/data/ 2>/dev/null || true
            cp -r bedagent/scripts ~/.openclaw/
            chmod +x ~/.openclaw/scripts/*.sh
            mkdir -p ~/.openclaw/hooks/bedagent-load-chain
            cp bedagent/hooks/bedagent-load-chain/HOOK.md ~/.openclaw/hooks/bedagent-load-chain/
            cp bedagent/hooks/bedagent-load-chain/handler.ts ~/.openclaw/hooks/bedagent-load-chain/
          }

      - name: Run verify.sh
        run: |
          bash bedagent/scripts/verify.sh --quiet || {
            echo "❌ verify.sh failed"
            exit 1
          }
          echo "✅ verify.sh passed"
